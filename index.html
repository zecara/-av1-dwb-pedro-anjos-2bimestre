<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compendio de Hyrule — Monstros</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Fundo com parallax -->
  <div id="bg-parallax"></div>
  <div id="bg-overlay"></div>

  <!-- NAVBAR -->
  <nav class="navbar-hyrule">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand-hyrule" href="index.html">Compendio de Hyrule</a>
      <span class="nav-subtitle">The Legend of Zelda — Breath of the Wild</span>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero-section">
    <p class="hero-ornamento">— — —</p>
    <h1 class="hero-title">Monstros de Hyrule</h1>
    <p class="hero-subtitle">Cada criatura tem sua historia. E seu apelido.</p>
    <div class="hero-divider"></div>
  </section>

  <!-- CONTEUDO -->
  <main class="container pb-5">

    <div id="loading" class="text-center py-5">
      <div class="spinner-hyrule mx-auto mb-3"></div>
      <p class="loading-text">Carregando criaturas...</p>
    </div>

    <div id="erro" class="text-center py-5" style="display:none;">
      <div class="erro-box d-inline-block">
        <h3>Algo deu errado</h3>
        <p id="erro-msg">Nao foi possivel carregar os dados.</p>
      </div>
    </div>

    <p class="resultado-count" id="resultado-count"></p>

    <div class="row g-4" id="lista-monstros"></div>

  </main>

  <!-- FOOTER -->
  <footer class="footer-hyrule">
    <p>mim de 10 fessor</p>
    <p class="footer-brand">AV1 DWB — Pedro Anjos — 2 Bimestre 2026</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
