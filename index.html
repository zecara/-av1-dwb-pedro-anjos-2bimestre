<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compêndio de Hyrule — Monstros</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Estilo personalizado -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar-hyrule">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand-hyrule" href="index.html">⚔️ Compêndio de Hyrule</a>
      <span class="nav-subtitle">The Legend of Zelda: Breath of the Wild</span>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero-section">
    <h1 class="hero-title">Monstros de Hyrule</h1>
    <p class="hero-subtitle">Conheça as criaturas que habitam o reino</p>
    <div class="hero-divider"></div>
  </section>

  <!-- CONTEÚDO -->
  <main class="container pb-5">

    <!-- Loading -->
    <div id="loading" class="text-center py-5">
      <div class="spinner-hyrule mx-auto mb-3"></div>
      <p class="loading-text">Carregando criaturas...</p>
    </div>

    <!-- Erro -->
    <div id="erro" class="text-center py-5" style="display:none;">
      <div class="erro-box d-inline-block">
        <h3>⚠️ Algo deu errado</h3>
        <p id="erro-msg">Não foi possível carregar os dados.</p>
      </div>
    </div>

    <!-- Contador -->
    <p class="resultado-count" id="resultado-count"></p>

    <!-- Grid -->
    <div class="row g-4" id="lista-monstros"></div>

  </main>

  <!-- FOOTER -->
  <footer class="footer-hyrule">
    <p>"It's dangerous to go alone!"</p>
    <p class="footer-brand">AV1 DWB — Pedro Anjos — 2º Bimestre · 2025</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
