<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhes — Compendio de Hyrule</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Fundo SVG Animado -->
  <svg id="bg-parallax" viewBox="0 0 1920 1080" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;">
    <defs>
      <linearGradient id="gradBg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#0a3d2f;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#0d2e14;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#060f08;stop-opacity:1" />
      </linearGradient>
    </defs>
    <rect width="1920" height="1080" fill="url(#gradBg)"/>
    <circle cx="300" cy="200" r="150" fill="#2d6e3e" opacity="0.3"/>
    <circle cx="1500" cy="400" r="200" fill="#4caf70" opacity="0.2"/>
    <circle cx="960" cy="800" r="180" fill="#2d6e3e" opacity="0.25"/>
    <rect x="400" y="600" width="300" height="200" fill="#1a5f45" opacity="0.15" rx="20"/>
    <polygon points="960,100 1100,300 820,300" fill="#4caf70" opacity="0.2"/>
  </svg>
  <div id="bg-overlay" style="display: none;"></div>

  <!-- NAVBAR -->
  <nav class="navbar-hyrule">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand-hyrule" href="index.html">Compendio de Hyrule</a>
      <span class="nav-subtitle">The Legend of Zelda — Breath of the Wild</span>
    </div>
  </nav>

  <!-- CONTEUDO -->
  <main class="container py-4 pb-5">

    <a href="index.html" class="btn-voltar mb-4 d-inline-block">Voltar para a lista</a>

    <div id="loading" class="text-center py-5">
      <div class="spinner-hyrule mx-auto mb-3"></div>
      <p class="loading-text">Carregando criatura...</p>
    </div>

    <div id="erro" class="text-center py-5" style="display:none;">
      <div class="erro-box d-inline-block">
        <h3>Algo deu errado</h3>
        <p id="erro-msg">Nao foi possivel carregar os dados.</p>
      </div>
    </div>

    <div id="detalhe-conteudo" style="display:none;"></div>

  </main>

  <!-- FOOTER -->
  <footer class="footer-hyrule">
    <p>mim de 10 fessor</p>
    <p class="footer-brand">AV1 DWB — Pedro Anjos — 2 Bimestre 2026</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/svg-animation.js"></script>
  <script src="js/detalhes.js"></script>
</body>
</html>
